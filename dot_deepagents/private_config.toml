[models]
default = "sakana:fugu-ultra"
recent = "sakana:fugu-ultra"

[models.providers.sakana]
display_name = "Sakana"
class_path = "langchain_openai:ChatOpenAI"
api_key_env = "SAKANA_API_KEY"
base_url = "https://api.sakana.ai/v1"
models = [
    "fugu-ultra",
    "fugu",
]

[models.providers.sakana.params]
use_responses_api = true
reasoning_effort = "xhigh"

[models.providers.sakana.profile]
tool_calling = true
max_input_tokens = 1000000
image_inputs = true
reasoning_output = true
structured_output = true

[startup]
mode = "dangerously-auto"

[agents]
recent = "agent"
