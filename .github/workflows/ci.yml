name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  chezmoi-apply:
    name: chezmoi apply (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Linux x64,   runner: blacksmith-4vcpu-ubuntu-2404 }
          - { name: Linux ARM64, runner: blacksmith-4vcpu-ubuntu-2404-arm }
          - { name: Windows x64, runner: blacksmith-4vcpu-windows-2025 }
          - { name: Windows ARM, runner: windows-11-arm, op_arch: x64 }
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install 1Password CLI
        uses: caipiralink/op-install-cli-action@main
        with:
          arch: ${{ matrix.op_arch || '' }}

      - uses: jdx/mise-action@v2
        with:
          install: false

      - name: Install chezmoi via mise
        run: mise use -g chezmoi@latest

      - name: Pre-seed chezmoi config
        shell: bash
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.toml" << 'EOF'
          [data]
            personal = true
            work_email = ""
            work_signing_key_item = ""
            op_account = ""
          EOF

      - name: chezmoi init and apply (Linux)
        if: runner.os == 'Linux'
        run: |
          chezmoi init --source "${{ github.workspace }}"
          sed -i 's/\[onepassword\]/[onepassword]\n  mode = "service"/' "$HOME/.config/chezmoi/chezmoi.toml"
          chezmoi apply

      - name: chezmoi init and apply (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          chezmoi init --source "${{ github.workspace }}"
          $cfg = "$env:USERPROFILE\.config\chezmoi\chezmoi.toml"
          (Get-Content $cfg) -replace '\[onepassword\]', "[onepassword]`nmode = `"service`"" | Set-Content $cfg
          chezmoi apply

  shellcheck:
    name: ShellCheck
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
        with:
          install: false
      - name: Install shellcheck via mise
        run: mise use -g shellcheck@latest
      - name: Run ShellCheck
        run: shellcheck private_dot_config/distrobox/executable_dev

  zsh-syntax:
    name: Zsh syntax check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - name: Install zsh
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh > /dev/null
      - name: Check zsh syntax
        run: zsh -n dot_zshrc

  lua-lint:
    name: Lua lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luarocks > /dev/null
          sudo luarocks install luacheck > /dev/null
      - name: Run luacheck
        run: luacheck private_dot_config/nvim/init.lua --globals vim --no-max-line-length

  pssa:
    name: PSScriptAnalyzer
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@v6
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path private_dot_config/powershell -Recurse -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  toml-check:
    name: TOML check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
        with:
          install: false
      - name: Install taplo via mise
        run: mise use -g taplo@latest
      - name: Check TOML files
        run: taplo check private_dot_config/starship.toml
